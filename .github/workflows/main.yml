name: Build CloudCLI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: siteboon/claudecodeui

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: cloudcli-dist
          path: |
            dist/
            node_modules/
